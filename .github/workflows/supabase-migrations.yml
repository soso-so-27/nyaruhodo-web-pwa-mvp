name: Supabase migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-supabase-migrations
  cancel-in-progress: false

jobs:
  push-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: fwqhpjumerbqufqgmibu
      SUPABASE_CLI_VERSION: 2.109.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"

      - name: Link production Supabase project
        run: npx supabase@${SUPABASE_CLI_VERSION} link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Push migrations
        run: npx supabase@${SUPABASE_CLI_VERSION} db push --linked --yes

      - name: Verify no pending migrations
        shell: bash
        run: |
          set -euo pipefail
          output="$(npx supabase@${SUPABASE_CLI_VERSION} db push --linked --dry-run 2>&1)"
          echo "$output"
          if ! grep -q "Remote database is up to date." <<< "$output"; then
            echo "::error::Supabase migration drift remains after db push."
            exit 1
          fi
