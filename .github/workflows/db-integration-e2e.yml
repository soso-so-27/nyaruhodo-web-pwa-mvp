name: DB integration E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: db-integration-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SUPABASE_CLI_VERSION: 2.109.0
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ANON_AUTH_ENABLED: "false"
      SLEEPING_DELIVERY_FAST_CANDIDATES: admin_storage
      PLAYWRIGHT_REQUIRE_LOCAL_SUPABASE: "1"
      PLAYWRIGHT_CHANNEL: chromium
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}
          github-token: ${{ github.token }}

      - name: Start local Supabase and apply migrations
        run: >-
          supabase start
          --exclude studio
          --exclude imgproxy
          --exclude edge-runtime
          --exclude logflare
          --exclude vector
          --exclude realtime
          --exclude supavisor
          --exclude mailpit

      - name: Export local Supabase credentials
        shell: bash
        run: |
          set -euo pipefail
          status="$(supabase status --output json)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(jq -r '.API_URL' <<< "$status")"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(jq -r '.ANON_KEY' <<< "$status")"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.SERVICE_ROLE_KEY' <<< "$status")"
          } >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run DB integration E2E
        run: >-
          npx playwright test
          tests/e2e/sleeping-delivery-pool-guards.spec.ts
          tests/e2e/storage-backup.spec.ts
          --project=desktop

      - name: Run critical Android and iPhone journeys
        run: npm run e2e:cross-browser

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: db-integration-e2e-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
